# ======================================================================
#  repower.cfg — settings for the power-loss recovery plugin
#
#  This file is your own copy (the installer does not overwrite it), so it
#  is safe to edit here or via the install.sh control panel. The recovery
#  MACROS live in repower_macros.cfg, which is symlinked from the repo and
#  auto-updates — do not copy macros here.
#
#  printer.cfg should include BOTH (the installer adds them):
#       [include repower.cfg]
#       [include repower_macros.cfg]
#
#  Requirements:
#    * [virtual_sdcard]  — print from the host (Mainsail / Fluidd).
#    * [force_move] with enable_force_move: True  — so recovery can set Z
#      without homing into the part (installer adds it if missing).
# ======================================================================

[repower]
# --- Snapshotting --------------------------------------------------------
#state_path: ~/printer_data/repower_state.json
save_interval: 1.0
#min_z_change: 0.0

# --- UI / dialogs --------------------------------------------------------
# Dialog & notification language: en or ru.
#language: en

# --- Recovery motion (used by REPOWER_RECOVER) ---------------------------
#z_hop: 5             ; lift before moving over the part (mm)
#travel_speed: 150    ; XY travel speed during recovery (mm/s)
#purge: 8             ; purge after re-heating to clear ooze (mm)
#purge_retract: 0.8   ; retract after purge to stop travel ooze (mm)
#prime: 0             ; extra prime after returning to the part (mm)
#park_x: -1           ; heat/purge spot off the model; <0 = use homed corner
#park_y: -1

# --- Probe-based Z recovery ----------------------------------------------
# Re-establish true Z by probing a CLEAR area of the bed (never the model).
# Needs a probe; safe on screw Z. The plugin auto-picks a point beside the
# model bounding box; falls back to a fixed point, then to trusting saved Z.
#use_probe: True
#recovery_clearance: 15    ; free margin (mm) to place an auto probe point
#recovery_probe_x: -1      ; fixed fallback probe point (mm); <0 = unset
#recovery_probe_y: -1

# --- Push notifications (on boot, when a recoverable print is found) ------
#   notify: none | telegram | ntfy
# Telegram (via @BotFather):
#   notify: telegram
#   notify_telegram_token: 123456:ABC-DEF...
#   notify_telegram_chat: 111111111
# ntfy (subscribe to the topic in the app):
#   notify: ntfy
#   notify_ntfy_topic: my-secret-printer-topic
#   notify_ntfy_url: https://ntfy.sh
#notify: none

# --- Auto-show dialog on boot (Mainsail/Fluidd) --------------------------
#prompt_on_startup: True
#prompt_retries: 6
#prompt_interval: 20.0


# Required for the Z handling in REPOWER_RECOVER. If you already have a
# [force_move] section elsewhere, ensure enable_force_move is True and delete
# this block.
#[force_move]
#enable_force_move: True


# ----------------------------------------------------------------------
#  Tip: add REPOWER_CLEAR to your PRINT_END and CANCEL_PRINT macros so a
#  stale snapshot is never left after a normal finish/cancel. (The plugin
#  also auto-clears on clean completion.)
#
#     [gcode_macro PRINT_END]
#     gcode:
#         ...your existing end gcode...
#         REPOWER_CLEAR
# ----------------------------------------------------------------------
