# ======================================================================
#  repower_macros.cfg — recovery macros (logic; auto-updated via symlink)
#
#  Do NOT edit — this file is symlinked from the repository and overwritten
#  on update. Tunables live in [repower] in repower.cfg (or the install.sh
#  control panel); the macros read them from printer.repower.*.
#
#  Included automatically by the installer alongside repower.cfg.
# ======================================================================

# ----------------------------------------------------------------------
#  Full recovery sequence. CoreXY + probe friendly: homes only X/Y, trusts
#  the (self-locking) Z, then re-establishes true Z by probing a CLEAR area
#  of the bed (never over the model). The hotend is heated only AFTER the
#  toolhead is lifted and homed, so heat-up ooze never lands on the model.
#
#  Per-call overrides (otherwise taken from [repower]):
#     USE_PROBE Z_HOP TRAVEL_SPEED PARK_X PARK_Y PURGE PURGE_RETRACT PRIME
#     PURGE_MODE (line|blob)
# ----------------------------------------------------------------------
[gcode_macro REPOWER_RECOVER]
description: Recover and resume a print interrupted by power loss
gcode:
    # Close the Mainsail/Fluidd recovery dialog and stop it re-popping.
    { action_respond_info("action:prompt_end") }
    REPOWER_PROMPT_DISMISS
    {% set rp = printer.repower %}
    {% if not rp.recoverable %}
        { action_respond_info("repower: nothing to recover") }
    {% else %}
        {% set x = rp.x|float %}
        {% set y = rp.y|float %}
        {% set z = rp.z|float %}
        {% set et = rp.extruder_temp|float %}
        {% set bt = rp.bed_temp|float %}
        {% set z_hop = params.Z_HOP|default(rp.z_hop)|float %}
        {% set travel = params.TRAVEL_SPEED|default(rp.travel_speed)|float * 60 %}
        {% set park_x = params.PARK_X|default(rp.park_x)|float %}
        {% set park_y = params.PARK_Y|default(rp.park_y)|float %}
        {% set purge = params.PURGE|default(rp.purge)|float %}
        {% set purge_retract = params.PURGE_RETRACT|default(rp.purge_retract)|float %}
        {% set prime = params.PRIME|default(rp.prime)|float %}
        {% set use_probe = params.USE_PROBE|default(rp.use_probe)|int %}
        {% set purge_mode = params.PURGE_MODE|default(rp.purge_mode)|string %}

        { action_respond_info(
            "repower: recovering at X%.1f Y%.1f Z%.2f (ext %.0f, bed %.0f)"
            % (x, y, z, et, bt)) }

        # 1) Start the bed heating in parallel — the bed does not ooze.
        {% if bt > 0 %}
            M140 S{bt}
        {% endif %}

        # 2) Trust the current Z (screw Z holds position when powered off),
        #    mark only Z as homed, then lift clear of the print. Hotend is
        #    still cold here, so no ooze on the part yet.
        SET_KINEMATIC_POSITION Z={z} SET_HOMED=z
        G91
        G1 Z{z_hop} F600
        G90

        # 3) Home X/Y (safe — the toolhead is lifted off the part).
        G28 X Y

        # 3b) Re-establish true Z by probing a CLEAR area of the bed (never
        #     over the model). repower picks a safe point beside the model;
        #     if there is none, rp.probe_ok is false and we trust the saved Z.
        {% if use_probe and rp.probe_ok %}
            { action_respond_info(
                "repower: probing clear bed at X%.1f Y%.1f"
                % (rp.probe_x|float, rp.probe_y|float)) }
            G1 X{rp.probe_x} Y{rp.probe_y} F{travel}
            PROBE
            SET_KINEMATIC_POSITION Z={rp.probe_z_offset} SET_HOMED=z
            G91
            G1 Z{z_hop} F600
            G90
        {% endif %}

        # 4) Optionally move to a dedicated park/purge spot off the model.
        {% if park_x >= 0 and park_y >= 0 %}
            G1 X{park_x} Y{park_y} F{travel}
        {% endif %}

        # 5) NOW reach printing temperature. Any ooze drips at the homed
        #    corner / park spot, not onto the model.
        {% if bt > 0 %}
            M190 S{bt}
        {% endif %}
        M109 S{et}

        # 6) Purge for clean flow. In 'line' mode (and when a clear area was
        #    found) the head is parked & heated at the corner; now retract,
        #    travel to the line start (away from the heat-up ooze) and draw a
        #    thin prime line on the bare bed. Otherwise just ooze in place.
        {% if purge > 0 %}
            {% if purge_mode == 'line' and rp.purge_line_ok %}
                G91
                G1 E-{purge_retract} F2100
                G90
                G1 X{rp.purge_x0} Y{rp.purge_y0} F{travel}
                G1 Z{rp.purge_line_z} F600
                G91
                G1 E{purge_retract} F2100
                G90
                G1 X{rp.purge_x1} Y{rp.purge_y1} E{purge} F{rp.purge_line_speed * 60}
                G91
                G1 E-{purge_retract} F2100
                G1 Z{z_hop} F600
                G90
            {% else %}
                G91
                G1 E{purge} F180
                G1 E-{purge_retract} F2100
                G90
            {% endif %}
        {% endif %}

        # 7) Travel back over the saved spot at the lifted height.
        G1 X{x} Y{y} F{travel}

        # 8) Un-retract the purge retract and apply any extra prime.
        {% set deret = (purge_retract if purge > 0 else 0) + prime %}
        {% if deret > 0 %}
            G91
            G1 E{deret} F180
            G90
        {% endif %}

        # 9) Descend to the saved layer height.
        G1 Z{z} F600

        # 10) Restore gcode modes/factors/fan/mesh/offset/E-origin and continue
        #     the file from the exact byte where it was interrupted.
        REPOWER_RESUME
    {% endif %}


# ----------------------------------------------------------------------
#  Helper macros for the Mainsail / Fluidd recovery dialog buttons.
# ----------------------------------------------------------------------
[gcode_macro REPOWER_PROMPT_CLOSE]
description: Close the repower recovery dialog (keeps the saved state)
gcode:
    { action_respond_info("action:prompt_end") }
    REPOWER_PROMPT_DISMISS

[gcode_macro REPOWER_PROMPT_DISCARD]
description: Close the recovery dialog and discard the saved state
gcode:
    { action_respond_info("action:prompt_end") }
    REPOWER_CLEAR
