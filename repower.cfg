# ======================================================================
#  repower.cfg — power-loss recovery for Klipper (software snapshots)
# ======================================================================
#
#  Include this file from your printer.cfg:
#       [include repower.cfg]
#
#  Requirements:
#    * [virtual_sdcard]  — you must print from the host (Mainsail / Fluidd).
#    * [force_move] with enable_force_move: True  — needed so the recovery
#      macro can tell Klipper the current Z height without homing into the
#      part. (See the [force_move] block below — uncomment if you don't
#      already have it.)
#
#  After an unexpected power loss, on the next boot Klipper will report that
#  a recoverable print is available. Run:
#       REPOWER_RECOVER
#  to heat up, re-home X/Y, return to the saved height and continue printing.
# ======================================================================

[repower]
# Absolute path to the snapshot file. Default (shown) lives under the
# printer data directory so it survives a host reboot.
#state_path: ~/printer_data/repower_state.json
# How often, in seconds, to capture a snapshot while printing. Lower values
# lose less progress on power loss but write to disk more often.
save_interval: 1.0
# Optional: only snapshot when Z moved at least this many mm (≈ per layer),
# to reduce flash/SD wear on long prints. 0 = snapshot every interval.
#min_z_change: 0.0
# UI / dialog language: en or ru. Applies to the Fluidd panel and prompts
# (takes effect after a restart). Default: en.
#language: ru

# Push notification when a recoverable print is detected on boot.
#   notify: none | telegram | ntfy   (default: none)
# Telegram — create a bot via @BotFather, get the token, and your chat id:
#   notify: telegram
#   notify_telegram_token: 123456:ABC-DEF...
#   notify_telegram_chat: 111111111
# ntfy — subscribe to a topic in the ntfy app, then:
#   notify: ntfy
#   notify_ntfy_topic: my-secret-printer-topic
#   notify_ntfy_url: https://ntfy.sh        (override for self-hosted)
#notify: none

# Required for the Z handling in REPOWER_RECOVER. If you already have a
# [force_move] section elsewhere, just make sure enable_force_move is True
# and delete this block.
#[force_move]
#enable_force_move: True


# ----------------------------------------------------------------------
#  Full recovery sequence. CoreXY + probe friendly: homes only X/Y, trusts
#  the (self-locking) Z.
#
#  IMPORTANT ordering: the hotend is heated to printing temperature only
#  AFTER the toolhead is lifted off the part and X/Y are homed. Otherwise a
#  blob of plastic oozes onto the print while it heats up. With homing first,
#  the ooze (and the optional purge) happens at the homed corner, not on the
#  model.
#
#  Tune the variables below (set once), or override per call, e.g.:
#     REPOWER_RECOVER PURGE=12 PRIME=1
#
#  Variables / call parameters:
#     Z_HOP        lift before moving over the part        (mm,   default 5)
#     TRAVEL_SPEED XY travel speed during recovery         (mm/s, default 150)
#     PARK_X/PARK_Y move here to heat/purge; <0 disables   (mm,   default off)
#     PURGE        filament to purge after heating          (mm,   default 8)
#     PURGE_RETRACT retract after purge to stop travel ooze (mm,   default 0.8)
#     PRIME        extra prime after returning to the part  (mm,   default 0)
# ----------------------------------------------------------------------
[gcode_macro REPOWER_RECOVER]
description: Recover and resume a print interrupted by power loss
variable_z_hop: 5
variable_travel_speed: 150
variable_park_x: -1
variable_park_y: -1
variable_purge: 8
variable_purge_retract: 0.8
variable_prime: 0
gcode:
    # Close the Mainsail/Fluidd recovery dialog and stop it re-popping.
    { action_respond_info("action:prompt_end") }
    REPOWER_PROMPT_DISMISS
    {% set rp = printer.repower %}
    {% if not rp.recoverable %}
        { action_respond_info("repower: nothing to recover") }
    {% else %}
        {% set cfg = printer['gcode_macro REPOWER_RECOVER'] %}
        {% set x = rp.x|float %}
        {% set y = rp.y|float %}
        {% set z = rp.z|float %}
        {% set et = rp.extruder_temp|float %}
        {% set bt = rp.bed_temp|float %}
        {% set z_hop = params.Z_HOP|default(cfg.z_hop)|float %}
        {% set travel = params.TRAVEL_SPEED|default(cfg.travel_speed)|float * 60 %}
        {% set park_x = params.PARK_X|default(cfg.park_x)|float %}
        {% set park_y = params.PARK_Y|default(cfg.park_y)|float %}
        {% set purge = params.PURGE|default(cfg.purge)|float %}
        {% set purge_retract = params.PURGE_RETRACT|default(cfg.purge_retract)|float %}
        {% set prime = params.PRIME|default(cfg.prime)|float %}

        { action_respond_info(
            "repower: recovering at X%.1f Y%.1f Z%.2f (ext %.0f, bed %.0f)"
            % (x, y, z, et, bt)) }

        # 1) Start the bed heating in parallel — the bed does not ooze.
        {% if bt > 0 %}
            M140 S{bt}
        {% endif %}

        # 2) Trust the current Z (Z motors hold position when powered off),
        #    mark only Z as homed, then lift clear of the print. Hotend is
        #    still cold here, so no ooze on the part yet.
        SET_KINEMATIC_POSITION Z={z} SET_HOMED=z
        G91
        G1 Z{z_hop} F600
        G90

        # 3) Home X/Y (safe — the toolhead is lifted off the part).
        G28 X Y

        # 4) Optionally move to a dedicated park/purge spot off the model.
        {% if park_x >= 0 and park_y >= 0 %}
            G1 X{park_x} Y{park_y} F{travel}
        {% endif %}

        # 5) NOW reach printing temperature. Any ooze drips at the homed
        #    corner / park spot, not onto the model.
        {% if bt > 0 %}
            M190 S{bt}
        {% endif %}
        M109 S{et}

        # 6) Purge a little for clean flow, then retract to stop travel ooze.
        {% if purge > 0 %}
            G91
            G1 E{purge} F180
            G1 E-{purge_retract} F2100
            G90
        {% endif %}

        # 7) Travel back over the saved spot at the lifted height.
        G1 X{x} Y{y} F{travel}

        # 8) Un-retract the purge retract and apply any extra prime.
        {% set deret = (purge_retract if purge > 0 else 0) + prime %}
        {% if deret > 0 %}
            G91
            G1 E{deret} F180
            G90
        {% endif %}

        # 9) Descend to the saved layer height.
        G1 Z{z} F600

        # 10) Restore gcode modes/factors/fan/mesh/offset/E-origin and continue
        #     the file from the exact byte where it was interrupted.
        REPOWER_RESUME
    {% endif %}


# ----------------------------------------------------------------------
#  Helper macros for the Mainsail / Fluidd recovery dialog buttons.
#  The dialog itself is raised automatically on boot when an interrupted
#  print is detected; run REPOWER_PROMPT to re-open it manually.
# ----------------------------------------------------------------------
[gcode_macro REPOWER_PROMPT_CLOSE]
description: Close the repower recovery dialog (keeps the saved state)
gcode:
    { action_respond_info("action:prompt_end") }
    REPOWER_PROMPT_DISMISS

[gcode_macro REPOWER_PROMPT_DISCARD]
description: Close the recovery dialog and discard the saved state
gcode:
    { action_respond_info("action:prompt_end") }
    REPOWER_CLEAR


# ----------------------------------------------------------------------
#  Housekeeping helpers.
#
#  Add REPOWER_CLEAR to your PRINT_END and CANCEL_PRINT macros so a stale
#  snapshot is never left behind after a normal finish/cancel. (The plugin
#  also auto-clears on clean completion, but doing it explicitly is instant
#  and robust.)
#
#  Example, if you wrap the stock macros:
#
#     [gcode_macro PRINT_END]
#     gcode:
#         ...your existing end gcode...
#         REPOWER_CLEAR
#
#     [gcode_macro CANCEL_PRINT]
#     rename_existing: CANCEL_PRINT_BASE
#     gcode:
#         REPOWER_CLEAR
#         CANCEL_PRINT_BASE
# ----------------------------------------------------------------------
